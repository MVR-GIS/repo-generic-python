name: analysis
channels:
  - conda-forge
dependencies:
  # Pinning to a minor version lets conda resolve the latest stable patch.
  # To lock an exact snapshot of all package versions (e.g., for archiving),
  # run: conda env export > environment-lock.yml
  - python=3.11
  - numpy>=1.26
  - pandas>=2.1
  - matplotlib>=3.8
  - seaborn>=0.13
  - jupyter>=1.0
  - jupyterlab>=4.0
  - notebook>=7.0
  - ipykernel>=6.27
  - ipywidgets>=8.1
  - openpyxl>=3.1
  - xlrd>=2.0
  - requests>=2.31
  - python-dotenv>=1.0
  - pyyaml>=6.0
  - pytest>=8.0
  - pip
